name: local-build-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repo-validation:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read pinned xcodegen version
        id: xcodegen-version
        run: echo "value=$(tr -d '[:space:]' < .xcodegen-version)" >> "$GITHUB_OUTPUT"
      - name: Install xcodegen
        run: |
          curl -Ls "https://github.com/yonaskolb/XcodeGen/releases/download/${{ steps.xcodegen-version.outputs.value }}/xcodegen.zip" -o "$RUNNER_TEMP/xcodegen.zip"
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          "$RUNNER_TEMP/xcodegen/install.sh" "$RUNNER_TEMP/xcodegen-root"
          export PATH="$RUNNER_TEMP/xcodegen-root/bin:$PATH"
          echo "$RUNNER_TEMP/xcodegen-root/bin" >> "$GITHUB_PATH"
          xcodegen --version
      - name: Report toolchain truth
        run: |
          xcode-select -p
          swift --version
      - name: Run repo validation
        run: |
          if [ ! -x scripts/ci.sh ]; then
            echo "scripts/ci.sh is required for repo-validation."
            exit 1
          fi

          bash scripts/ci.sh
